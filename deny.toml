# cargo-deny configuration (cargo-deny 0.19+)
# https://embarkstudios.github.io/cargo-deny/
#
# Copy to repo root as deny.toml

[advisories]
vulnerability = "deny"
unmaintained = "workspace"
yanked = "warn"
notice = "workspace"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
