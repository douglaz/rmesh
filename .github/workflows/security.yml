# Security workflow for Nix-based Rust projects
# Copy to .github/workflows/security.yml
# Requires: deny.toml in repo root

name: Security

on:
  push:
    branches: [master, main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  pull_request:
    branches: [master, main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run cargo audit
      run: nix run nixpkgs#cargo-audit -- audit

    - name: Run cargo audit (JSON output)
      run: nix run nixpkgs#cargo-audit -- audit --json > audit-results.json
      continue-on-error: true

    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: security-audit-results
        path: audit-results.json
        retention-days: 30

  supply-chain:
    name: Supply Chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run cargo deny
      run: nix run nixpkgs#cargo-deny -- check
